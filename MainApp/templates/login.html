{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <link rel="icon" type="image" href="{% static 'Images/logo.png' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>
<body class="">
    <form method="post" id="formSubmit" novalidate>
        {% csrf_token %}
        <h2 class="text-center mb-3">Student Management System</h2>
        <h3 class="text-center mb-3"> Welcome Back!</h3>
        <div class="form-floating">
            <input type="text" class="form-control" name="username" placeholder="Enter your name"
                fdprocessedid="auvp7">
            <label for="floatingInput">Username</label>
        </div>

        <div class="form-floating">
            <input type="password" class="form-control" name="password" placeholder="Password"
                fdprocessedid="6dms9f">
            <label for="floatingPassword">Password</label>
        </div>
        <div class="form-check text-start my-3"> <input class="form-check-input" type="checkbox" name="remember-me" value="remember-me">
            <label class="form-check-label">
                Remember me
            </label>
        </div>
        <button class="btn btn-primary w-100 py-2" type="submit" fdprocessedid="bfcwrq">Login</button>
    </form>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
