<!-- Header part -->
<!-- Header -->
{% load static %}
<header
  class="h-20 bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-700 flex items-center justify-between px-4 sm:px-6 lg:px-8 shrink-0 transition-colors duration-300 shadow-sm">

  <!-- Left -->
  <div class="flex items-center gap-4">

    <!-- Sidebar Toggle -->
    <button id="toggleBtn"
      class="w-11 h-11 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition flex items-center justify-center cursor-pointer">
      <i class="fa-solid fa-bars text-xl text-slate-700 dark:text-slate-200"></i>
    </button>

  </div>

  <!-- Right -->
  <div class="flex items-center gap-2 sm:gap-4">

    <!-- Notification -->
    <div class="relative">
      <button onclick="toggleNotification()"
        class="relative w-11 h-11 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition flex items-center justify-center">
        <i class="fa-regular fa-bell text-xl text-slate-700 dark:text-slate-200"></i>

        {% if settings.notifications %}
        <span class="absolute top-2 right-2 w-2.5 h-2.5 rounded-full bg-red-500"></span>
        <span class="absolute top-2 right-2 w-2.5 h-2.5 rounded-full bg-red-500 animate-ping"></span>
        {% endif %}
      </button>

      <div id="notificationMenu"
        class="hidden absolute right-0 mt-3 w-80 bg-white dark:bg-slate-800 rounded-2xl shadow-xl border z-50">

        <div class="p-4 border-b font-bold">
          Notifications
        </div>

        {% for activity in notifications %}

        <div class="px-4 py-3 hover:bg-slate-100 dark:hover:bg-slate-700">

          <div class="flex items-start gap-3">

            <span class="w-3 h-3 rounded-full bg-{{ activity.color }}-500 mt-2"></span>

            <div>

              <p class="text-sm">
                {{ activity.title }}
              </p>

              <small class="text-slate-500">
                {{ activity.created_at|timesince }} ago
              </small>

            </div>

          </div>

        </div>

        {% empty %}

        <p class="p-5 text-center text-slate-500">
          No notifications
        </p>

        {% endfor %}

      </div>
    </div>



    <!-- <button
      class="relative w-11 h-11 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition flex items-center justify-center">
      <i class="fa-regular fa-bell text-xl text-slate-700 dark:text-slate-200"></i>
      <span class="absolute top-2 right-2 w-2.5 h-2.5 rounded-full bg-red-500"></span>
      <span class="absolute top-2 right-2 w-2.5 h-2.5 rounded-full bg-red-500 animate-ping"></span>
    </button> -->

    <!-- Theme Toggle -->
    <button
      class="myToggleBtn w-11 h-11 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition flex items-center justify-center">

      <i class="fa-solid fa-moon theme_icon text-lg text-slate-700 dark:text-yellow-400"></i>

    </button>

    <!-- Profile -->
    <button
      class="flex items-center gap-3 rounded-xl px-2 sm:px-3 py-2 hover:bg-slate-100 dark:hover:bg-slate-800 transition">

      <!-- Avatar -->
      <div>
        <img src="{% static 'Images/user.jpg' %}"
          class="w-14 h-14 rounded-full object-cover border-2 border-indigo-500">
      </div>

      <!-- User Info -->
      <div class="hidden lg:block text-left">
        <h4 class="font-semibold text-slate-800 dark:text-white leading-none">
          Admin User
        </h4>

        <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">
          Administrator
        </p>
      </div>

      <!-- Arrow -->
      <i class="fa-solid fa-chevron-down text-xs text-slate-500 dark:text-slate-300 hidden sm:block"></i>

    </button>

  </div>

</header>
