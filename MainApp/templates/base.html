{% load static %}
<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Management System</title>
  <link rel="icon" type="image" href="{% static 'Images/logo.png' %}" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class'
    }
  </script>
  <link rel="stylesheet" href="{% static 'src/style.css' %}" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 transition-colors duration-300">
  <!-- site loader -->
  <div id="loader"
    class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900 transition-opacity duration-500">
    <div class="relative">
      <div class="w-16 h-16 border-4 border-slate-700 rounded-full"></div>
      <div
        class="absolute top-0 w-16 h-16 border-4 border-t-sky-500 border-r-transparent border-b-sky-500 border-l-transparent rounded-full animate-spin">
      </div>
      <div class="absolute top-6 left-6 w-4 h-4 bg-sky-500 rounded-full animate-pulse"></div>
    </div>
  </div>

  <div class="flex h-screen bg-gray-100">
    {% include "components/sidebar.html" %}

    <div class="flex flex-col flex-1 overflow-hidden">
      {% include "components/navbar.html" %}

      <!-- Main section -->
      <main class="flex-1 w-full h-screen px-6  py-6 overflow-y-auto bg-white dark:bg-slate-900">
        {% block content %}
        {% endblock %}
      </main>

    </div>
  </div>
  <script src="{% static 'JS/script.js' %}"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script>
    // sidebar btn slider
    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("sidebarOverlay")
    const toggleBtn = document.getElementById("toggleBtn");
    const sidebarTexts = document.querySelectorAll(".sidebar-text");
    const navItems = document.querySelectorAll(".nav-item");

    toggleBtn.addEventListener("click", () => {
      if (window.innerWidth < 1024) {
        sidebar.classList.toggle("-translate-x-full");
        overlay.classList.toggle("hidden");

        return;
      }

      sidebar.classList.toggle("w-64");
      sidebar.classList.toggle("w-20");

      sidebarTexts.forEach(text => {
        text.classList.toggle("hidden")
      })
      navItems.forEach(item => {
        item.classList.toggle("justify-center")
      });
    });

    overlay.addEventListener("click", () => {
      sidebar.classList.toggle("-translate-x-full");
      overlay.classList.toggle("hidden");
    })

    window.addEventListener("resize", () => {
      if (window.innerWidth >= 1024) {
        sidebar.classList.remove("-translate-x-full");
        overlay.classList.add("hidden");
      } else {
        sidebar.classList.add("-translate-x-full")
      }
    });

    // Theme toggle
    document.querySelectorAll(".myToggleBtn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.documentElement.classList.toggle("dark")

        const isDark = document.documentElement.classList.contains("dark");

        localStorage.setItem("theme", isDark ? "dark" : "light");

        document.querySelectorAll(".theme_icon").forEach(icon => {
          icon.classList.toggle("fa-moon", !isDark);
          icon.classList.toggle("fa-sun", isDark);
        });
      });
    });

    if (localStorage.getItem("theme") === "dark") {
      document.documentElement.classList.add("dark");

      document.querySelectorAll(".theme_icon").forEach(icon => {
        icon.classList.remove("fa-moon");
        icon.classList.add("fa-sun");
      });
    }

    // Show CurrentDate
    const currentDate = document.getElementById("showCurrentDate");

    const today = new Date();

    const options = {
      weekday: "long",
      day: "numeric",
      month: "long",
      year: "numeric",
    };

    currentDate.querySelector("span").textContent = today.toLocaleDateString("en-IN", options)

    //  Cards
    function createMiniChart(id, data, color) {
      new Chart(document.getElementById(id), {
        type: "line",
        data: {
          labels: ["", "", "", "", "", ""],
          datasets: [{
            data: data,
            borderColor: color,
            borderWidth: 2,
            tension: 0.4,
            pointRadius: 0,
            fill: false
          }]
        },
        options: {
          responsive: false,
          plugins: {
            legend: { display: false },
            tooltip: { enabled: false }
          },
          scales: {
            x: { display: false },
            y: { display: false }
          }
        }
      });
    }

    // Total student
    createMiniChart(
      "totalStudentsChart",
      [20, 25, 28, 26, 31, 36],
      "#4f46e5"
    );
    // Male Student
    createMiniChart(
      "maleStudentsChart",
      [12, 14, 13, 16, 14, 17],
      "#22c55e"
    )
    // Female student
    createMiniChart(
      "femaleStudentsChart",
      [8, 10, 9, 12, 14, 11],
      "#ec4899"
    )

    // Total courses
    createMiniChart(
      "totalCoursesChart",
      [8, 10, 12, 11, 13, 11],
      "#007fff"
    )

    // Admission-overview chart
    new Chart(document.getElementById("admissionChart"), {

      type: "line",

      data: {

        labels: ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul"],

        datasets: [{

          data: [10, 17, 14, 24, 30, 18, 25],

          borderColor: "#4f46e5",

          backgroundColor: "rgba(79,70,229,.12)",

          fill: true,

          pointRadius: 4,

          pointHoverRadius: 6,

          tension: .4

        }]

      },

      options: {
        responsive: true,
        maintainAspectRatio: false,

        plugins: {
          legend: {
            display: false
          }
        },

        scales: {
          x: {
            grid: {
              display: false
            }
          },

          y: {
            beginAtZero: true
          }
        }

      }
    });

    // Student course
    const ctx = document.getElementById("courseChart");

    new Chart(ctx, {

      type: "doughnut",

      data: {

        labels: ["BCA", "B.Tech", "MCA", "BBA", "MBA"],

        datasets: [{

          data: [30, 25, 20, 15, 10],

          backgroundColor: [
            "#6366F1", // Indigo
            "#3B82F6", // Blue
            "#22C55E", // Green
            "#EC4899", // Pink
            "#F59E0B"  // Orange
          ],

          borderWidth: 0,
          hoverOffset: 8,
        }]

      },

      options: {
        responsive: true,
        maintainAspectRatio: false,

        cutout: "60%",

        plugins: {
          legend: {
            display: false
          },

          tooltip: {
            backgroundColor: "#1e293b",
            padding: 12,
            cornerRadius: 10
          }
        }
      }
    });

  </script>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <script>
    $(document).ready(function () {
      $('#studentForm').submit(function (e) {
        let valid = true
        $(".danger").html("");

        const name = $('#name').val().trim();
        const email = $('#email').val().trim();
        const phone = $('#phone').val().trim();

        if (name == "") {
          $("#nameError").text("Name is required")
          valid = false
        }
        if (email === '' || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          $('#emailError').text('Valid email is required');
          valid = false;
        }
        if (phone === '' || !/^\d{10}$/.test(phone)) {
          $('#phoneError').text('Valid 10-digit phone number is required');
          valid = false;
        }
        if(!valid){
          e.preventDefault()
        }
      })
    })
  </script>
</body>

</html>
