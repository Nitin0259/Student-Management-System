{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <link rel="icon" type="image" href="{% static 'Images/logo.png' %}">
    <link rel="stylesheet" href="{% static 'src/style.css' %}">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="bg-slate-100 flex h-screen">
    <!-- site loader -->
    <div id="loader"
        class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900 transition-opacity duration-500">
        <div class="relative">
            <div class="w-16 h-16 border-4 border-slate-700 rounded-full"></div>
            <div
                class="absolute top-0 w-16 h-16 border-4 border-t-sky-500 border-r-transparent border-b-sky-500 border-l-transparent rounded-full animate-spin">
            </div>
            <div class="absolute top-6 left-6 w-4 h-4 bg-sky-500 rounded-full animate-pulse"></div>
        </div>
    </div>

    {% load static %}

    <div class="flex h-screen bg-gray-100">

        <!-- Sidebar -->
        <aside id="sidebar"
            class="w-68 bg-slate-900 text-white transition-all duration-300 ease-in-out flex flex-col overflow-hidden">

            <!-- Logo -->
            <div id="brandName" class="flex items-center gap-2 px-3 py-6 border-b border-slate-700 whitespace-nowrap">
                <div class="text-indigo-500 text-3xl">
                    <i class="fa-solid fa-graduation-cap"></i>
                </div>

                <div class="sidebar-text flex flex-col transition-opacity duration-300">
                    <span class="text-white text-3xl font-bold tracking-tight">SMS</span>
                    <span class="text-slate-400 text-[12px] font-medium tracking-wider">
                        Student Management System
                    </span>
                </div>
            </div>

            <!-- Navigation -->
            <nav class="flex-1 px-4 py-6 space-y-2">

                <a href="{% url 'dashboard' %}"
                    class="flex items-center px-4 py-3 rounded-lg bg-indigo-600 hover:bg-indigo-700 hover:translate-x-2 hover:shadow-lg transition-all duration-300">
                    <i
                        class="fa-solid fa-gauge text-lg group-hover:rotate-12 transition-transform duration-300"></i><span
                        class="sidebar-text ml-3 font-medium transition-opacity duration-300">Dashboard</span>
                </a>

                <a href="#" class="flex items-center px-4 py-3 rounded-lg hover:bg-slate-800 transition">
                    <i class="fa-solid fa-user-graduate text-lg"></i><span
                        class="sidebar-text ml-3 transition-opacity duration-300">Students</span>
                </a>

                <a href="#" class="flex items-center px-4 py-3 rounded-lg hover:bg-slate-800 transition">
                    <i class="fa-solid fa-user-plus text-lg"></i><span class="sidebar-text ml-3 transition-opacity duration-300">Add Student</span>
                </a>

                <a href="#" class="flex items-center px-4 py-3 rounded-lg hover:bg-slate-800 transition">
                    <i class="fa-solid fa-magnifying-glass text-lg"></i>
                    <span class="sidebar-text ml-3 transition-opacity duration-300">Search</span>
                </a>
                <a href="#" class="flex items-center px-4 py-3 rounded-lg hover:bg-slate-800 transition">
                    <i class="fa-solid fa-chart-line text-lg"></i>
                    <span class="sidebar-text ml-3 transition-opacity duration-300">Reports</span>
                </a>
                <a href="#" class="flex items-center px-4 py-3 rounded-lg hover:bg-slate-800 transition">
                    <i class="fa-solid fa-gear text-lg"></i>
                    <span class="sidebar-text ml-3 transition-opacity duration-300">Settings</span>
                </a>
            </nav>

            <!-- Logout -->
            <div class="p-4 border-t border-slate-700">
                <a href="#"
                    class="flex items-center justify-center px-4 py-3 rounded-lg bg-red-600 hover:bg-red-700 transition">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    <span class="sidebar-text ml-3 font-medium transition-opacity duration-300">Logout</span>
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col">
            <header class="bg-white p-4 flex justify-between items-center shadow-sm">
                <!-- sidebar btn toogle -->
                <button id="toggleBtn" class="text-xl hover:text-sky-400">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <div class="flex items-center gap-4">
                    <div class="relative cursor-pointer">
                        <i class="fa-solid fa-bell text-2xl text-gray-700 hover:text-indigo-600 transition"></i>

                        <span
                            class="absolute -top-1 -right-1 flex h-4 w-4 items-center justify-center rounded-full bg-red-500 text-xs font-bold text-white">
                            3
                        </span>
                    </div>
                    <div class="w-8 h-8 rounded-full bg-slate-300"></div>
                </div>
            </header>
        </main>

    </div>

    <script src="{% static 'JS/script.js' %}"></script>

    <script>
        // sidebar btn slider
        const sidebar = document.getElementById("sidebar")
        const toggleBtn = document.getElementById("toggleBtn")
        const sidebarTexts = document.querySelectorAll(".sidebar-text") 

        toggleBtn.addEventListener('click', () => {
            sidebar.classList.toggle("w-68")
            sidebar.classList.toggle("w-20")

            sidebarTexts.forEach(text => {
                text.classList.toggle("opacity-0")
                text.classList.toggle("hidden")
            })
        })
    </script>
</body>

</html>
