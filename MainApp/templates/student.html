{% extends 'base.html' %}
{% block content %}
<!-- Student-page -->
<div class="space-y-6 px-2 py-2">
    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
        <div>
            <h2
                class="text-xl md:text-2xl xl:text-3xl font-bold tracking-tight text-slate-900 dark:text-white transition-colors duration-300">
                Students</h2>
            <p class="mt-1 text-slate-500 dark:text-slate-400 text-sm font-medium transition-colors duration-300">Manage
                all enrolled students</p>
        </div>

        <a href="#"
            class="inline-flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-3 rounded-xl shadow transition">
            <i class="fa-solid fa-plus"></i>
            Add Student
        </a>
    </div>

    <div class="bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 p-5 shadow-sm">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 shadow-sm">
            <!-- Search -->
            <div class="relative md:col-span-2">

                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>

                <input type="text" placeholder="Search student..."
                    class="w-full pl-11 pr-4 py-3 rounded-xl border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 dark:text-white focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>
            <!-- Course -->
            <select
                class="px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 dark:text-white outline-none">

                <option>All Courses</option>
                <option>BCA</option>
                <option>B.Tech</option>
                <option>MCA</option>
                <option>BBA</option>

            </select>

            <!-- Status -->
            <select
                class="px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 dark:text-white outline-none">

                <option>All Status</option>
                <option>Active</option>
                <option>Inactive</option>

            </select>
        </div>
    </div>

    <!-- Students Table -->
    <div
        class="bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm overflow-x-auto">
        <table class="w-full">
            <thead class="bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200">
                <tr>
                    <th class="px-6 py-4 text-left">Photo</th>
                    <th class="px-6 py-4 text-left">Name</th>
                    <th class="px-6 py-4 text-left">Roll no.</th>
                    <th class="px-6 py-4 text-left">Course</th>
                    <th class="px-6 py-4 text-left">Phone</th>
                    <th class="px-6 py-4 text-left">Status</th>
                    <th class="px-6 py-4 text-center">Action</th>
                </tr>
            </thead>

            <tbody class="divide-y divide-slate-200 dark:divide-slate-700">
                {% for student in students %}
                
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
