<!-- Overlay -->
<div id="sidebarOverlay" class="fixed inset-0 bg-black/50 z-40 hidden lg:hidden"></div>

<!-- Sidebar -->
<aside id="sidebar"
  class="fixed lg:relative top-0 left-0 z-50 h-screen w-64 bg-slate-900 border-r border-slate-800 text-white flex flex-col overflow-hidden transform -translate-x-full lg:translate-x-0 transition-all duration-300 ease-in-out">

  <!-- Logo -->
  <div class="h-20 flex items-center px-6 border-b border-slate-800">
    <div
      class="w-11 h-11 rounded-xl bg-gradient-to-r from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg shrink-0">
      <i class="fa-solid fa-graduation-cap text-xl"></i>
    </div>

    <span class="sidebar-text ml-3 text-2xl font-bold whitespace-nowrap transition-all duration-300">
      SMS
    </span>
  </div>

  <!-- Navigation -->
  <nav class="flex-1 px-3 py-5 space-y-2 overflow-y-auto">
    <a href="{% url 'dashboard' %}" class="nav-item group flex items-center gap-4 px-4 py-3 rounded-xl transition
      {% if request.path == '/dashboard/' %}
      bg-gradient-to-r from-indigo-600 to-indigo-500
      {% else %}
      hover:scale-[1.02]
      {% endif %}">
      <div class="w-10 h-10 rounded-lg flex items-center justify-center transition
      {% if request.path == '/dashboard/' %}
      bg-white/20
      {% else %}
      bg-slate-800 group-hover:bg-indigo-600
      {% endif %}">
        <i class="fa-solid fa-gauge"></i>
      </div>
      <span class="sidebar-text">Dashboard</span>
    </a>

    <a href="{% url 'students' %}" class="nav-item group flex items-center gap-4 px-4 py-3 rounded-xl transition
      {% if request.path == '/students/' %}
      bg-gradient-to-r from-indigo-600 to-indigo-500
      {% else %}
      hover:scale-[1.02]
      {% endif %}">

      <div
        class="w-10 h-10 rounded-lg flex items-center justify-center transition
        {% if request.path == '/students/' %}
        bg-white/20
        {% else %}
        bg-slate-800 group-hover:bg-indigo-600
        {% endif %}">
        <i class="fa-solid fa-user-graduate"></i>
      </div>

      <span class="sidebar-text">Students</span>

    </a>

    <a href="{% url 'add_student' %}" class="nav-item group flex items-center gap-4 px-4 py-3 rounded-xl transition 
    {% if request.path == '/add_student/' %}
    bg-gradient-to-r from-indigo-600 to-indigo-500
    {% else %}
    hover:scale-[1.02]
    {% endif %}">

      <div
        class="w-10 h-10 rounded-lg flex items-center justify-center transition
        {% if request.path == '/add_student/' %}
        bg-white/20
        {% else %}
        bg-slate-800 group-hover:bg-indigo-600
        {% endif %}">
        <i class="fa-solid fa-user-plus"></i>
      </div>

      <span class="sidebar-text">Add Student</span>

    </a>

    <a href="{% url 'reports' %}" class="nav-item group flex items-center gap-4 px-4 py-3 rounded-xl transition
    {% if request.path == '/reports/' %}
    bg-gradient-to-r from-indigo-600 to-indigo-500
    {% else %}
    hover:scale-[1.02]
    {% endif %}">

      <div
        class="w-10 h-10 rounded-lg flex items-center justify-center transition
        {% if request.path == '/reports/' %}
        bg-white/20
        {% else %}
        bg-slate-800 group-hover:bg-indigo-600
        {% endif %}">
        <i class="fa-solid fa-chart-line"></i>
      </div>

      <span class="sidebar-text">Reports</span>

    </a>
    <a href="{% url 'settings' %}" class="nav-item group flex items-center gap-4 px-4 py-3 rounded-xl
    {% if request.path == '/settings/' %}
    bg-gradient-to-r from-indigo-600 to-indigo-500
    {% else %}
    hover:scale-[1.02]
    {% endif %}">

      <div
        class="w-10 h-10 rounded-lg flex items-center justify-center transition
        {% if request.path == '/settings/' %}
        bg-white/20
        {% else %}
        bg-slate-800 group-hover:bg-indigo-600
        {% endif %}">
        <i class="fa-solid fa-gear"></i>
      </div>

      <span class="sidebar-text">Settings</span>

    </a>
  </nav>

  <!-- Logout -->
  <div class="border-t border-slate-700 p-3">
    <a href="{% url 'logout' %}"
      class="nav-item group flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-red-600/20 text-red-400 transition">

      <div class="w-10 h-10 rounded-lg bg-red-500/20 flex items-center justify-center">
        <i class="fa-solid fa-right-from-bracket"></i>
      </div>

      <span class="sidebar-text">Logout</span>

    </a>
  </div>
</aside>
