{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <link rel="icon" type="image" href="{% static 'Images/logo.png' %}">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 flex h-screen">
    <!-- site loader -->
    <div id="loader"
        class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900 transition-opacity duration-500">
        <div class="relative">
            <div class="w-16 h-16 border-4 border-slate-700 rounded-full"></div>
            <div
                class="absolute top-0 w-16 h-16 border-4 border-t-sky-500 border-r-transparent border-b-sky-500 border-l-transparent rounded-full animate-spin">
            </div>
            <div class="absolute top-6 left-6 w-4 h-4 bg-sky-500 rounded-full animate-pulse"></div>
        </div>
    </div>

    {% load static %}

    <div class="flex min-h-screen bg-gray-100">

        <!-- Sidebar -->
        <aside class="w-64 bg-slate-900 text-white flex flex-col">

            <!-- Logo -->
            <a href="{% url 'dashboard' %}" class="flex items-center gap-3 p-5 border-b border-slate-700">

                <div class="w-20 h-12 flex items-center justify-center rounded-xl bg-violet-600 shadow-lg">

                    <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24"
                        class="w-12 h-8 text-white">
                        <path
                            d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3zm-8 8.18V15c0 2.76 3.58 5 8 5s8-2.24 8-5v-3.82l-8 4.36-8-4.36z" />
                    </svg>
                </div>

                <div>
                    <h1 class="text-3xl font-bold text-white">SMS</h1>
                    <p class="text-sm text-gray-300">
                        Student Management System
                    </p>
                </div>
            </a>

            <!-- Navigation -->
            <nav class="flex-1 px-4 py-6 space-y-2">

                <a href="{% url 'dashboard' %}"
                    class="flex items-center px-4 py-3 rounded-lg bg-sky-600 hover:bg-sky-700 transition">
                    📊 <span class="ml-3">Dashboard</span>
                </a>

                <a href="#" class="flex items-center px-4 py-3 rounded-lg hover:bg-slate-800 transition">
                    👨‍🎓 <span class="ml-3">Students</span>
                </a>

                <a href="#" class="flex items-center px-4 py-3 rounded-lg hover:bg-slate-800 transition">
                    ➕ <span class="ml-3">Add Student</span>
                </a>

                <a href="#" class="flex items-center px-4 py-3 rounded-lg hover:bg-slate-800 transition">
                    🔍 <span class="ml-3">Search</span>
                </a>

                <a href="#" class="flex items-center px-4 py-3 rounded-lg hover:bg-slate-800 transition">
                    📄 <span class="ml-3">Reports</span>
                </a>

                <a href="#" class="flex items-center px-4 py-3 rounded-lg hover:bg-slate-800 transition">
                    ⚙️ <span class="ml-3">Settings</span>
                </a>

            </nav>

            <!-- Logout -->
            <div class="p-4 border-t border-slate-700">
                <a href="%"
                    class="block w-full text-center px-4 py-3 rounded-lg bg-red-600 hover:bg-red-700 transition">
                    Logout
                </a>
            </div>

        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-8">
            {% block content %}
            {% endblock %}
        </main>

    </div>

    <script src="{% static 'JS/script.js' %}"></script>
</body>

</html>
