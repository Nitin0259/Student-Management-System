{% load static %}
<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Management System</title>
    <link rel="icon" type="image" href="{% static 'Images/logo.png' %}" />
    <link rel="stylesheet" href="{% static 'src/style.css' %}">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-slate-900 via-blue-900 to-slate-900 h-screen flex items-center justify-center p-4">

    <!-- site loading -->
    <div id="loader"
        class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900 transition-opacity duration-500">
        <div class="relative">
            <div class="w-16 h-16 border-4 border-slate-700 rounded-full"></div>
            <div
                class="absolute top-0 w-16 h-16 border-4 border-t-sky-500 border-r-transparent border-b-sky-500 border-l-transparent rounded-full animate-spin">
            </div>
            <div class="absolute top-6 left-6 w-4 h-4 bg-sky-500 rounded-full animate-pulse"></div>
        </div>
    </div>

    <div class="bg-white/95 backdrop-blur-sm p-10 rounded-3xl shadow-2xl w-full max-w-md border border-white/20">

        <div class="text-center mb-3">
            <div class="inline-block p-3 rounded-2xl bg-blue-600 text-white mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path d="M12 14l9-5-9-5-9 5 9 5z" />
                    <path
                        d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z" />
                </svg>
            </div>
            <h2 class="text-2xl mb-2 font-bold text-slate-800">Student Portal</h2>
            <p class="text-slate-500 mb-5 text-[16px]">Login to your academic dashboard</p>
        </div>

        {% if messages %}
        {% for message in messages %}
        <div class="mb-4 rounded-lg bg-red-100 border border-red-400 text-red-700 px-4 py-3">
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}

        <form method="post" id="formSubmit" novalidate>
            {% csrf_token %}
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-600 mb-1" for="username">Username</label>
                <input id="username" type="text" name="username" placeholder="Enter your name"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition duration-200" />
                <p id="usernameError" class="text-red-500 text-sm mt-1"></p>
            </div>

            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-600 mb-1" for="password">Password</label>
                <input id="password" type="password" name="password" placeholder="Password"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition duration-200" />
                <p id="passwordError" class="text-red-500 text-sm mt-1"></p>
            </div>

            <div class="flex items-center mb-6">
                <input class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500" type="checkbox"
                    name="remember-me" value="remember-me" />
                <label class="ml-2 text-sm text-gray-600 cursor-pointer select-none">
                    Remember me
                </label>
            </div>
            <button
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition duration-300 shadow-md"
                type="submit" fdprocessedid="bfcwrq">
                Login
            </button>
        </form>
    </div>

    <script src="{% static 'JS/script.js' %}"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script>
        $(document).ready(function () {

            $("#formSubmit").submit(function (e) {

                let valid = true;

                $("#usernameError").text("");
                $("#passwordError").text("");

                const username = $("#username").val().trim();
                const password = $("#password").val().trim();

                if (username === "") {
                    $("#usernameError").text("Username is required.");
                    $("#username").addClass("border-red-500");
                    valid = false;
                }

                if (password === "") {
                    $("#passwordError").text("Password is required.");
                    $("#password").addClass("border-red-500");
                    valid = false;
                }

                if (!valid) {
                    e.preventDefault();
                }

            });

        });
    </script>
</body>

</html>
