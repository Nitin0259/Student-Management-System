{% load static %}
<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Management System</title>
  <link rel="icon" type="image" href="{% static 'Images/logo.png' %}" />
  <link rel="stylesheet" href="{% static 'src/output.css' %}" />
  <link rel="stylesheet" href="{% static 'src/style.css' %}" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    .glass {
      background: rgba(255, 255, 255, 0.45);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.25);
    }

    .dark .glass {
      background-color: rgba(15, 23, 42, 1);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    html {
      scroll-behavior: smooth;
    }
  </style>
</head>

<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 transition-colors duration-300">
  <!-- site loader -->
  <div id="loader"
    class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900 transition-opacity duration-500">
    <div class="relative">
      <div class="w-16 h-16 border-4 border-slate-700 rounded-full"></div>
      <div
        class="absolute top-0 w-16 h-16 border-4 border-t-sky-500 border-r-transparent border-b-sky-500 border-l-transparent rounded-full animate-spin">
      </div>
      <div class="absolute top-6 left-6 w-4 h-4 bg-sky-500 rounded-full animate-pulse"></div>
    </div>
  </div>

  <div class="flex h-screen bg-gray-100">
    {% include "components/sidebar.html" %}

    <div class="flex flex-col flex-1 overflow-hidden">
      {% include "components/navbar.html" %}

      <!-- Main section -->
      <main class="flex-1 w-full h-screen overflow-y-auto dark:bg-slate-900">
        {% block content %}
        {% endblock %}
      </main>

    </div>
  </div>
  <script src="{% static 'JS/script.js' %}"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script>
    // sidebar btn slider
    const sidebar = document.getElementById("sidebar");
    const toggleBtn = document.getElementById("toggleBtn");
    const sidebarTexts = document.querySelectorAll(".sidebar-text");

    toggleBtn.addEventListener("click", () => {
      sidebar.classList.toggle("w-72");
      sidebar.classList.toggle("w-20");

      sidebarTexts.forEach((text) => {
        text.classList.toggle("opacity-0");
        text.classList.toggle("hidden");
      });
    });

    // Theme toggle
    const themeToggle = document.querySelectorAll(".myToggleBtn");

    themeToggle.forEach((btn) => {
      btn.addEventListener("click", () => {
        document.documentElement.classList.toggle("dark");

        const isDark = document.documentElement.classList.contains("dark");

        localStorage.setItem("theme", isDark ? "dark" : "light");

        document.querySelectorAll(".theme_icon").forEach((icon) => {
          if (isDark) {
            icon.classList.remove("fa-moon", "text-slate-600");
            icon.classList.add("fa-sun", "text-yellow-400");
          } else {
            icon.classList.remove("fa-sun", "text-yellow-400");
            icon.classList.add("fa-moon", "text-slate-600");
          }
        });
      });
    });

    if (localStorage.getItem("theme") === "dark") {
      document.documentElement.classList.add("dark");

      document.querySelectorAll(".theme_icon").forEach((icon) => {
        icon.classList.remove("fa-moon", "text-slate-600");
        icon.classList.add("fa-sun", "text-yellow-400");
      });
    }

    // Show CurrentDate
    const currentDate = document.getElementById("showCurrentDate");

    const today = new Date();

    const options = {
      weekday: "long",
      day: "numeric",
      month: "long",
      year: "numeric",
    };

    currentDate.querySelector("span").textContent = today.toLocaleDateString("en-IN", options)

    function createMiniChart(id, data, color) {
      new Chart(document.getElementById(id), {
        type: "line",
        data: {
          labels: ["", "", "", "", "", ""],
          datasets: [{
            data: data,
            borderColor: color,
            borderWidth: 2,
            tension: 0.4,
            pointRadius: 0,
            fill: false
          }]
        },
        options: {
          responsive: false,
          plugins: {
            legend: { display: false },
            tooltip: { enabled: false }
          },
          scales: {
            x: { display: false },
            y: { display: false }
          }
        }
      });
    }

    // Total student
    createMiniChart(
      "totalStudentsChart",
      [20, 25, 28, 26, 31, 36],
      "#4f46e5"
    );
    // Male Student
    createMiniChart(
      "maleStudentsChart",
      [12, 14, 13, 16, 14, 17],
      "#22c55e"
    )
    // Female student
    createMiniChart(
      "femaleStudentsChart",
      [8, 10, 9, 12, 14, 11],
      "#ec4899"
    )

    // Total courses
    createMiniChart(
      "totalCoursesChart",
      [8, 10, 12, 11, 13, 11],
      "#007fff"
    )

    // Admission-overview chart
    new Chart(document.getElementById("admissionChart"), {

      type: "line",

      data: {

        labels: ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul"],

        datasets: [{

          data: [10, 17, 14, 24, 30, 18, 25],

          borderColor: "#4f46e5",

          backgroundColor: "rgba(79,70,229,.12)",

          fill: true,

          pointRadius: 4,

          pointHoverRadius: 6,

          tension: .4

        }]

      },

      options: {

        plugins: {
          legend: {
            display: false
          }
        },

        scales: {
          x: {
            grid: {
              display: false
            }
          },

          y: {
            beginAtZero: true
          }
        }

      }

    });

  </script>
</body>

</html>
